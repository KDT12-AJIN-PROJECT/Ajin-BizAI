server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1000;

    proxy_buffer_size 16k;
    proxy_buffers 8 64k;
    proxy_busy_buffers_size 128k;

    # ── 외부 API 역방향 프록시 (CORS 우회) ────────────────────────
    location /proxy/bizinfo/ {
        proxy_pass https://www.bizinfo.go.kr/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.bizinfo.go.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Referer https://www.bizinfo.go.kr/;
        add_header Access-Control-Allow-Origin *;
    }

    location /proxy/bizfiles/ {
        proxy_pass https://www.bizinfo.go.kr/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.bizinfo.go.kr;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    location /proxy/apis/ {
        proxy_pass https://apis.data.go.kr/;
        proxy_ssl_server_name on;
        proxy_set_header Host apis.data.go.kr;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    location /proxy/kstartupfiles/ {
        proxy_pass https://www.k-startup.go.kr/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.k-startup.go.kr;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    # ── LM Studio 로컬 LLM 프록시 ──────────────────────────────
    location /proxy/lmstudio/ {
        proxy_pass http://host.docker.internal:1234/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── 백엔드 API 프록시 ────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 파일 업로드: multipart boundary 보존
        proxy_request_buffering off;
        client_max_body_size 50m;
        # SSE 스트리밍: 응답 버퍼링 비활성화 → 토큰 즉시 전달
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
        add_header X-Accel-Buffering no;
    }

    # ── SPA 라우팅 (새로고침 시 index.html 반환) ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 캐시 방지 — 항상 최신 버전 참조
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }
}

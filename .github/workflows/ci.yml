name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  syntax-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check (all Python files)
        run: |
          python -m compileall -q backend/
          python -m py_compile backend/main.py
